# Nginx配置文件 - 不安装独立Tomcat，转发到嵌入式Tomcat
# 适用于使用项目内置嵌入式Tomcat的情况

# 全局配置
worker_processes  1;
worker_rlimit_nofile 65535;

events {
    worker_connections  1024;
}

# HTTP配置
http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志配置
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   error;

    # 性能优化配置
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    gzip  on;

    # 服务器配置
    server {
        # 监听80端口（HTTP）
        listen       80;
        # 服务器域名/IP
        server_name  localhost your-domain.com;

        # 字符集设置
        charset utf-8;

        # 转发配置 - 不安装独立Tomcat，直接转发到嵌入式Tomcat
        location / {
            # 转发到本地8080端口（嵌入式Tomcat运行端口）
            proxy_pass http://127.0.0.1:8080;
            
            # 代理设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 长连接设置
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # 静态资源优化（如果有独立的静态资源目录）
        location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://127.0.0.1:8080;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
