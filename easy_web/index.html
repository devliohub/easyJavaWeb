  <script>
	function detectmob() {
	  var isMobile = navigator.userAgent.match(/Android/i)
		|| navigator.userAgent.match(/webOS/i)
		|| navigator.userAgent.match(/iPhone/i)
		|| navigator.userAgent.match(/iPad/i)
		|| navigator.userAgent.match(/BlackBerry/i)
		|| navigator.userAgent.match(/Windows Phone/i);
		
	  var ua = navigator.userAgent.toLowerCase();
	  var isWeixin = ua.match(/MicroMessenger/i) == "micromessenger" ? true : false;
	  //alert( isMobile + '-' + isWeixin )
	  return isMobile || isWeixin;
	}
	if ( device.mobile() || detectmob() ) {
	  location.href = 'uh5/' + location.search + location.hash
	} else {
	  location.href = 'pc/' + location.search + location.hash
	}
